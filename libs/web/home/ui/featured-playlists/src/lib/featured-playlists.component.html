@if (featuredPlaylists$ | async; as playlists) {
  @if (message$ | async; as message) {
    <h2 class="mt-8 mb-4 text-heading">{{ message }}</h2>
  }
  <div class="common-grid">
    @for (playlist of playlists; track playlist) {
      <as-card
        [title]="playlist.name"
        [description]="playlist.description"
        [imageUrl]="playlist.images[0]?.url!"
        [uri]="playlist.uri"
        [routerUrl]="playlist.routeUrl"
        (togglePlay)="togglePlay($event, playlist.uri)">
      </as-card>
    }
  </div>
}
<div
  asInfiniteScroll
  [enabled]="(hasMore$ | async) === true && (isLoading$ | async) === false"
  (scrolledToBottom)="loadMore()">
</div>
@if (isLoading$ | async) {
  <as-spinner></as-spinner>
}
