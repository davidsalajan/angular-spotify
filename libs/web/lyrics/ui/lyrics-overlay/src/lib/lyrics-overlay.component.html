<div class="lyrics-overlay" *ngrxLet="lines$ as lines">
  <div class="previous-line" *ngIf="lines?.previousText as prevText">
    {{ prevText }}
  </div>
  <div
    class="current-line"
    [class.line-enter]="lines"
    [class.line-float]="lines"
    [style.--start-x]="lines?.entryOrigin?.startX"
    [style.--start-y]="lines?.entryOrigin?.startY"
    [style.--ctrl-x]="lines?.entryOrigin?.controlX1"
    [style.--ctrl-y]="lines?.entryOrigin?.controlY1"
    [style.--drift-x1]="lines?.drift?.x1"
    [style.--drift-y1]="lines?.drift?.y1"
    [style.--drift-x2]="lines?.drift?.x2"
    [style.--drift-y2]="lines?.drift?.y2"
    [style.--float-duration]="lines?.floatDuration"
  >
    {{ lines?.currentText }}
  </div>
  <div class="next-line" *ngIf="lines?.nextText as nxtText">
    {{ nxtText }}
  </div>
</div>
